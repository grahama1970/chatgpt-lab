name: WebGPT Command Dispatcher

on:
  push:
    branches:
      - main
    paths:
      - agent-state/next-command.json

jobs:
  dispatch-agent:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate command envelope
        run: |
          python3 scripts/validate_agent_state.py --skip-result

      - name: Dispatch agent workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_VERSION: "2022-11-28"
        run: |
          command_id="$(python3 -c 'import json; print(json.load(open("agent-state/next-command.json", encoding="utf-8"))["command_id"])')"
          state_path="$(python3 -c 'import json; print(json.load(open("agent-state/next-command.json", encoding="utf-8"))["state_path"])')"
          workflow="$(python3 -c 'import json; print(json.load(open("agent-state/next-command.json", encoding="utf-8"))["workflow"])')"

          test "$workflow" = "agent-dispatch.yml"
          test "$state_path" = "agent-state/next-command.json"
          export COMMAND_ID="$command_id"
          export STATE_PATH="$state_path"

          payload="$(python3 -c 'import json, os; print(json.dumps({"ref": "main", "inputs": {"command_id": os.environ["COMMAND_ID"], "state_path": os.environ["STATE_PATH"]}}))' )"

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/agent-dispatch.yml/dispatches" \
            -d "$payload"
