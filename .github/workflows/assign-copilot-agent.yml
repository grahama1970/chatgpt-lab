name: Assign Copilot Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to hand to Copilot cloud agent
        required: true
        type: string
      base_ref:
        description: Base branch for the agent branch and pull request
        required: true
        default: main
        type: string
      create_pull_request:
        description: Ask the Agent Tasks API to create a pull request
        required: true
        default: true
        type: boolean
      model:
        description: Optional Copilot agent model; leave blank for auto-selection
        required: false
        default: ""
        type: string

jobs:
  start-agent-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start Copilot cloud-agent task
        id: start_task
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COPILOT_AGENT_TASK_TOKEN: ${{ secrets.COPILOT_AGENT_TASK_TOKEN }}
        run: |
          args=(
            --issue-number "${{ inputs.issue_number }}"
            --base-ref "${{ inputs.base_ref }}"
          )
          if [ "${{ inputs.create_pull_request }}" = "true" ]; then
            args+=(--create-pull-request)
          fi
          if [ -n "${{ inputs.model }}" ]; then
            args+=(--model "${{ inputs.model }}")
          fi
          python3 scripts/start_copilot_agent_task.py "${args[@]}"

      - name: Validate receipt
        id: validate_receipt
        if: always()
        run: |
          python3 scripts/validate_agent_state.py \
            --skip-next-command \
            --command-id "copilot-agent-issue-${{ inputs.issue_number }}"

      - name: Upload assignment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-agent-assignment-result
          path: |
            agent-state/last-result.json
            stdout.txt
            stderr.txt
          if-no-files-found: error
          retention-days: 14

      - name: Commit assignment receipt
        if: ${{ always() && steps.validate_receipt.outcome == 'success' }}
        run: |
          git config user.name "PhatGPT-LAB GitHub Actions"
          git config user.email "phatgpt-lab@users.noreply.github.com"
          git add agent-state/last-result.json
          if git diff --cached --quiet; then
            echo "No assignment receipt change to commit."
            exit 0
          fi
          git commit -m "Record Copilot agent assignment receipt issue ${{ inputs.issue_number }}"
          git push
