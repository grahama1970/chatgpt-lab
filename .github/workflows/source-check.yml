name: ChatGPT-Lab Source Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-control-plane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate control plane
        run: |
          mkdir -p artifacts
          python3 scripts/validate_control_plane.py > artifacts/control-plane-validation.json
          cat artifacts/control-plane-validation.json
          python3 scripts/validate_agent_state.py > artifacts/agent-state-validation.json
          cat artifacts/agent-state-validation.json
          python3 scripts/update_controller_state.py --check > artifacts/controller-state-validation.json
          cat artifacts/controller-state-validation.json
          python3 scripts/validate_goal_capsule.py > artifacts/goal-capsule-validation.json
          cat artifacts/goal-capsule-validation.json
          python3 scripts/validate_agent_ticket_contracts.py > artifacts/agent-ticket-contract-validation.json
          cat artifacts/agent-ticket-contract-validation.json
          python3 -m unittest discover -s tests

      - name: Upload validation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-lab-control-plane-validation
          path: |
            artifacts/control-plane-validation.json
            artifacts/agent-state-validation.json
            artifacts/controller-state-validation.json
            artifacts/goal-capsule-validation.json
            artifacts/agent-ticket-contract-validation.json
          if-no-files-found: error
          retention-days: 14
